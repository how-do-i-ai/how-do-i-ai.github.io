name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # The build job is read-only with respect to GitHub API surfaces.
    # Write access is scoped to the `audit-comment` job below, which
    # runs only on pull_request events — keeping push-to-main runs from
    # carrying any PR-write capability they would never exercise.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fails fast if tests/visual/DOCKER_IMAGE_TAG (used to regenerate
      # Playwright-based baselines) has drifted from devDependencies.@playwright/test.
      # See tests/visual/README.md § Parity enforcement and PR discipline,
      # PDR-007 § Constraints 1, and audit-tooling-design § 5 Risk 6.
      - name: Playwright version parity (Docker ↔ npm)
        run: npm run check:playwright-version-parity

      - name: Security audit
        run: npm audit --omit=dev

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # Playwright-driven regression gates (non-audit): QA-09 visual
      # regression + QA-08 axe-core WCAG 2.2 AA + QA-07 touch-target
      # audit. QA-10.1 route clustering and QA-10.3 invariant specs
      # are Playwright projects too, but they run as separate named
      # steps in the "QA-10 audit steps" block below so each audit
      # component reports its status distinctly in the CI log.
      # Explicit `--project` flags limit this step to the non-audit
      # Playwright projects defined in playwright.config.ts.
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        # Fast-fail guard: a stall fails in 8 min instead of eating the
        # whole 30-min job budget. The historical 30-min hang was the
        # Node 24.16 extract-zip deadlock (yauzl stream-destruction,
        # microsoft/playwright#40998), cured by the @playwright/test
        # 1.60.0 upgrade. This timeout is belt-and-suspenders for any
        # future stall on this historically-cold install step.
        timeout-minutes: 8
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: QA-07 / QA-08 / QA-09 — Playwright suites
        run: |
          npx playwright test \
            --project=chromium \
            --project=touch-targets-320 \
            --project=touch-targets-375 \
            --project=touch-targets-414 \
            --project=touch-targets-768

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright trace/diff artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

      # --------------------------------------------------------------
      # QA-10 audit steps — PDR-007 Phase 1 ("install-now" components).
      #
      # Each component runs as an individual named step so its exit
      # status is reported distinctly in the CI log. Steps invoke the
      # corresponding `test:audit:*` package.json script (per-component
      # scripts established across #120/#121/#122; meta-script family
      # in #126) so local dev and CI share the same entry points —
      # see audit-tooling-design.md § 6 Item 10 (meta-scripts) and § 6
      # Item 11 Option A (extend existing `build` job).
      #
      # Cache sharing: the Playwright browser cache is populated above
      # (step "Cache Playwright browsers") and reused across every
      # Playwright invocation — no duplicate browser install. The
      # `test:audit:*` scripts each begin with `npm run build` for
      # local-dev ergonomics; because all steps run in the same job
      # filesystem, those build calls share Astro's Vite cache
      # (`.astro/`, `node_modules/.vite/`) already populated by the
      # "Build" step above — the audit-step rebuilds are therefore
      # partially cache-warmed: Vite's dep graph and Astro's `.astro/`
      # content collections are reused, while Rollup bundling and SSG
      # emission re-run. We prefer this small CI-time cost over
      # diverging local vs CI entry points.
      #
      # Audit-only vs regression-gated (PDR-007 Constraint 4 /
      # audit-tooling-design.md § 6 Item 11): once a component is
      # adopted into a Phase, it runs on EVERY PR and gates merge.
      # There is no audit-only skip mode — that would defeat the
      # gate. The only optional execution pattern is path-filtering
      # (run a component only when relevant source files change),
      # decided per-component at each phase gate based on the
      # CI-time revisit thresholds in PDR-007. No Phase 1 component
      # uses path-filtering today.
      #
      # QA-10.4 (Phase 2, #132) is intentionally NOT in this block —
      # it attaches JSON sidecars to each QA-09 PNG inside the existing
      # `QA-07 / QA-08 / QA-09 — Playwright suites` step above, so it
      # ships without a new CI step. QA-10.5 (Phase 2, #133) adds its
      # own step below. Phase 3 QA-10.6 extends this block in its own
      # tracking issue (#134).
      # --------------------------------------------------------------

      - name: QA-10.1 — Route clustering
        run: npm run test:audit:routes

      - name: QA-10.2 — Critical widths
        run: npm run test:audit:widths

      - name: QA-10.3 — Invariant specs
        run: npm run test:audit:invariants

      - name: QA-10.5 — OG meta + RSS 2.0 audit
        run: npm run test:audit:og-rss

      # Unified artifact upload — covers routes-report.json,
      # widths-report.json, invariants-report.json, og-rss-report.json.
      # Triggered on failure only so reviewers can pull per-run reports
      # without re-running the job. `if-no-files-found: ignore`
      # accommodates early-failing audits that exit before writing
      # their report.
      - name: Upload QA-10 audit reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qa-10-audit-reports
          path: tests/audit/__reports__/*.json
          retention-days: 14
          if-no-files-found: ignore

      # --------------------------------------------------------------
      # QA-10 aggregated audit report (#131).
      #
      # Consumes the per-component JSON reports emitted by QA-10.1
      # (routes), QA-10.2 (widths), QA-10.3 (invariants), and QA-10.5
      # (og-rss) above, and renders a single consolidated Markdown
      # document. QA-10.4 runs inline inside the QA-07/08/09 step and
      # does not emit its own JSON today; the aggregator handles that
      # gracefully (see scripts/audit-report.mjs docblock).
      #
      # `if: ${{ !cancelled() }}` — the aggregator must run regardless
      # of whether earlier audit steps passed or failed (AC bullet 3:
      # "regardless of pass/fail"). Skipped steps leave their JSON
      # absent; the aggregator reports them as NOT RUN.
      #
      # The script itself always exits 0 — aggregator reports, never
      # gates. CI gating stays on the per-component steps whose non-zero
      # exits stop the build independently.
      # --------------------------------------------------------------
      - name: QA-10 aggregated audit report
        if: ${{ !cancelled() }}
        run: node scripts/audit-report.mjs

      - name: Upload aggregated audit report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: qa-10-audit-report
          path: tests/audit/__reports__/audit-report.md
          retention-days: 14
          if-no-files-found: warn

      # QA-06 Lighthouse mobile gates. Builds once at step above; LHCI
      # runs its own static server from ./dist, so no preview needed.
      - name: QA-06 — Lighthouse mobile gates
        run: npx lhci autorun

      - name: Upload Lighthouse artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseci
          path: .lighthouseci/
          retention-days: 14

  # ----------------------------------------------------------------
  # QA-10 audit-report PR comment upsert (#131).
  #
  # Runs only on pull_request events. Kept as a separate job so the
  # PR-write permission stays scoped to the comment-posting surface —
  # the `build` job above runs on push-to-main too and is read-only.
  #
  # `needs: build` so the aggregated Markdown artifact exists before
  # this job runs. `if: ${{ !cancelled() && github.event_name == ... }}`
  # — `!cancelled()` (not `always()`) ensures the comment upsert
  # still runs when the build job exited non-zero with an audit
  # failure, but does NOT run if the workflow itself was cancelled.
  # ----------------------------------------------------------------
  audit-comment:
    needs: build
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download aggregated audit report
        uses: actions/download-artifact@v4
        with:
          name: qa-10-audit-report
          path: qa-10-audit-report

      # PR-comment upsert (AC bullet 4): ONE stable comment per PR,
      # updated in place on re-runs (never appended). Marker string
      # `<!-- qa-10-audit-report -->` is set by the aggregator's
      # COMMENT_MARKER constant; find-comment locates by marker and
      # create-or-update-comment replaces the body.
      - name: Find previous audit report comment
        id: find-audit-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- qa-10-audit-report -->'

      - name: Create or update audit report comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-audit-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: qa-10-audit-report/audit-report.md
          edit-mode: replace
