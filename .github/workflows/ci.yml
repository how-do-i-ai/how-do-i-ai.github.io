name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fails fast if tests/visual/DOCKER_IMAGE_TAG (used to regenerate
      # Playwright-based baselines) has drifted from devDependencies.@playwright/test.
      # See tests/visual/README.md § Parity enforcement and PR discipline,
      # PDR-007 § Constraints 1, and audit-tooling-design § 5 Risk 6.
      - name: Playwright version parity (Docker ↔ npm)
        run: npm run check:playwright-version-parity

      - name: Security audit
        run: npm audit --omit=dev

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # Playwright-driven gates: QA-09 visual regression +
      # QA-08 axe-core WCAG 2.2 AA + QA-07 touch-target audit +
      # QA-10.1 route clustering (PDR-007 Phase 1 audit tooling).
      # A single `playwright test` invocation covers all four
      # suites because projects in playwright.config.ts use
      # testMatch to route specs to the right project(s).
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: QA-07 / QA-08 / QA-09 / QA-10.1 — Playwright suites
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright trace/diff artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

      # QA-10.2 Critical widths audit (PDR-007 Phase 1). Pure-Node; no
      # Playwright, no browser. Reads dist/_astro/*.css from the Build
      # step above. Cross-cutting audit orchestration (cache reuse,
      # unified report artifact, aggregator) lands in #127 alongside
      # the QA-10.1 and QA-10.3 steps.
      - name: QA-10.2 — Critical widths audit
        run: node scripts/extract-widths.mjs

      # Scoped to this audit's single report file to keep the artifact
      # boundary explicit; #127 can replace this with a unified
      # tests/audit/__reports__/*.json upload when QA-10.1 + QA-10.3
      # land alongside.
      - name: Upload QA-10.2 widths audit report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: qa-10-2-widths-report
          path: tests/audit/__reports__/widths-report.json
          retention-days: 14
          if-no-files-found: ignore

      # QA-06 Lighthouse mobile gates. Builds once at step above; LHCI
      # runs its own static server from ./dist, so no preview needed.
      - name: QA-06 — Lighthouse mobile gates
        run: npx lhci autorun

      - name: Upload Lighthouse artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseci
          path: .lighthouseci/
          retention-days: 14
