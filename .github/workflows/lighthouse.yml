name: Lighthouse CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'lighthouserc.json'
      - '.github/workflows/lighthouse.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse mobile gates (QA-06)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Run Lighthouse CI
        run: npx lhci autorun

      - name: Post Lighthouse scores to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const lhciDir = '.lighthouseci';
            if (!fs.existsSync(lhciDir)) {
              core.warning('No .lighthouseci/ directory found — skipping PR comment.');
              return;
            }

            const lhrFiles = fs.readdirSync(lhciDir).filter(f => /^lhr-\d+\.json$/.test(f));
            if (lhrFiles.length === 0) {
              core.warning('No Lighthouse reports found — skipping PR comment.');
              return;
            }

            const linksPath = `${lhciDir}/links.json`;
            const links = fs.existsSync(linksPath) ? JSON.parse(fs.readFileSync(linksPath, 'utf8')) : {};

            const runsByUrl = {};
            for (const f of lhrFiles) {
              const r = JSON.parse(fs.readFileSync(`${lhciDir}/${f}`, 'utf8'));
              const url = r.finalDisplayedUrl || r.finalUrl;
              (runsByUrl[url] ||= []).push({
                performance: r.categories.performance?.score,
                accessibility: r.categories.accessibility?.score,
                'best-practices': r.categories['best-practices']?.score,
                seo: r.categories.seo?.score,
              });
            }

            const median = (arr) => {
              const valid = arr.filter(x => x !== null && x !== undefined).sort((a, b) => a - b);
              return valid.length === 0 ? null : valid[Math.floor(valid.length / 2)];
            };
            const worst = (arr) => {
              const valid = arr.filter(x => x !== null && x !== undefined);
              return valid.length === 0 ? null : Math.min(...valid);
            };
            const pct = (s) => (s === null || s === undefined) ? 'n/a' : Math.round(s * 100);
            const bar = (s, threshold) => {
              if (s === null || s === undefined) return '';
              return Math.round(s * 100) >= threshold ? ' ✅' : ' ❌';
            };

            const urls = Object.keys(runsByUrl).sort();
            const rows = urls.map(u => {
              const runs = runsByUrl[u];
              const perf = median(runs.map(r => r.performance));
              const a11y = worst(runs.map(r => r.accessibility));
              const bp = median(runs.map(r => r['best-practices']));
              const seo = median(runs.map(r => r.seo));
              const path = new URL(u).pathname || '/';
              const reportLink = links[u] ? ` ([report](${links[u]}))` : '';
              return `| \`${path}\`${reportLink} | ${pct(perf)}${bar(perf, 95)} | ${pct(a11y)}${bar(a11y, 100)} | ${pct(bp)}${bar(bp, 95)} | ${pct(seo)}${bar(seo, 95)} |`;
            });

            const marker = '<!-- lighthouse-ci-report -->';
            const body = [
              marker,
              '### Lighthouse CI results',
              '',
              'Mobile viewport 375×667, Slow 4G simulated throttling. Perf / BP / SEO aggregated as **median of 3 runs**; Accessibility as **worst of 3 runs** (pessimistic — spec requires 100 on every run).',
              '',
              '| Page | Performance (≥95) | Accessibility (=100) | Best Practices (≥95) | SEO (≥95) |',
              '|------|-------------------|----------------------|----------------------|-----------|',
              ...rows,
              '',
              'Thresholds per `hq/docs/website/prd.md` § QA-06 (private HQ repo).',
              '',
              `Run: \`${context.runId}\` | Commit: \`${context.sha.slice(0, 7)}\``,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
